<svg xmlns="http://www.w3.org/2000/svg" width="1439" height="1080" viewBox="0 0 1439 1080" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Programa temporal 31 - Insercion en lista vacia</title>
  <desc id="desc">Lamina visual con salida de consola y explicacion de insercion del primer nodo en una lista enlazada simple.</desc>

  <defs>
    <linearGradient id="fondo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6ff" />
      <stop offset="100%" stop-color="#f9fdf7" />
    </linearGradient>
    <linearGradient id="barra" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
  </defs>

  <rect width="1439" height="1080" fill="url(#fondo)" />
  <rect x="0" y="0" width="1439" height="116" fill="url(#barra)" />

  <text x="72" y="74" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff">
    Programa temporal 31: Insercion en lista vacia (Lista enlazada simple)
  </text>

  <text x="72" y="170" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a" font-weight="700">
    1) Estado inicial
  </text>
  <rect x="72" y="192" width="602" height="196" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
  <text x="108" y="252" font-family="Courier New, monospace" font-size="28" fill="#111827">inicio -> null</text>
  <text x="108" y="308" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#334155">
    La lista esta vacia, por eso inicio no apunta a ningun nodo.
  </text>

  <text x="72" y="456" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a" font-weight="700">
    2) Insercion del primer nodo (dato = 42)
  </text>
  <rect x="72" y="478" width="1292" height="224" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />

  <rect x="330" y="560" width="220" height="86" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2" />
  <line x1="440" y1="560" x2="440" y2="646" stroke="#334155" stroke-width="2" />
  <text x="360" y="545" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#0f172a" font-weight="700">Nodo</text>
  <text x="355" y="615" font-family="Courier New, monospace" font-size="30" fill="#0f172a">42</text>
  <text x="460" y="615" font-family="Courier New, monospace" font-size="28" fill="#0f172a">null</text>

  <text x="110" y="606" font-family="Courier New, monospace" font-size="30" fill="#0f172a">inicio</text>
  <line x1="190" y1="596" x2="320" y2="596" stroke="#0f766e" stroke-width="5" marker-end="url(#flecha)" />

  <defs>
    <marker id="flecha" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
  </defs>

  <text x="72" y="760" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a" font-weight="700">
    3) Salida en consola
  </text>
  <rect x="72" y="782" width="1292" height="250" rx="16" fill="#0b1220" />
  <text x="112" y="840" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">Lista inicial:</text>
  <text x="112" y="886" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">null</text>
  <text x="112" y="942" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">Lista despues de anadir primer dato en lista vacia:</text>
  <text x="112" y="988" font-family="Courier New, monospace" font-size="29" fill="#34d399">42 -&gt; null</text>
</svg>
