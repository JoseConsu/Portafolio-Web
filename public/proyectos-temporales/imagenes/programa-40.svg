<svg xmlns="http://www.w3.org/2000/svg" width="1439" height="1080" viewBox="0 0 1439 1080" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Programa temporal 40 - For complejidad 1</title>
  <desc id="desc">Lamina visual que explica un ciclo for con incremento de 2 y complejidad lineal.</desc>

  <defs>
    <linearGradient id="fondo40" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6ff" />
      <stop offset="100%" stop-color="#f7fee7" />
    </linearGradient>
    <linearGradient id="barra40" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <marker id="flecha40" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#0f766e" />
    </marker>
  </defs>

  <rect width="1439" height="1080" fill="url(#fondo40)" />
  <rect width="1439" height="120" fill="url(#barra40)" />
  <text x="64" y="76" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Programa temporal 40: For complejidad 1</text>

  <text x="72" y="178" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#0f172a">1) Codigo Java</text>
  <rect x="72" y="204" width="1294" height="326" rx="20" fill="#0b1220" />
  <text x="116" y="270" font-family="Courier New, monospace" font-size="30" fill="#93c5fd">int</text>
  <text x="180" y="270" font-family="Courier New, monospace" font-size="30" fill="#e5e7eb">c, n = 20;</text>
  <text x="116" y="332" font-family="Courier New, monospace" font-size="30" fill="#c084fc">for</text>
  <text x="188" y="332" font-family="Courier New, monospace" font-size="30" fill="#e5e7eb">(int i = 0; i &lt; n / 2; i += 2) {</text>
  <text x="170" y="394" font-family="Courier New, monospace" font-size="30" fill="#facc15">System.out.println(i);</text>
  <text x="116" y="456" font-family="Courier New, monospace" font-size="30" fill="#e5e7eb">}</text>

  <text x="72" y="604" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#0f172a">2) Iteraciones</text>
  <rect x="72" y="630" width="1294" height="188" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
  <text x="116" y="704" font-family="Courier New, monospace" font-size="31" fill="#0f172a">i = 0</text>
  <line x1="232" y1="694" x2="334" y2="694" stroke="#0f766e" stroke-width="5" marker-end="url(#flecha40)" />
  <text x="360" y="704" font-family="Courier New, monospace" font-size="31" fill="#0f172a">i = 2</text>
  <line x1="476" y1="694" x2="578" y2="694" stroke="#0f766e" stroke-width="5" marker-end="url(#flecha40)" />
  <text x="604" y="704" font-family="Courier New, monospace" font-size="31" fill="#0f172a">i = 4</text>
  <line x1="720" y1="694" x2="822" y2="694" stroke="#0f766e" stroke-width="5" marker-end="url(#flecha40)" />
  <text x="848" y="704" font-family="Courier New, monospace" font-size="31" fill="#0f172a">i = 6</text>
  <line x1="964" y1="694" x2="1066" y2="694" stroke="#0f766e" stroke-width="5" marker-end="url(#flecha40)" />
  <text x="1092" y="704" font-family="Courier New, monospace" font-size="31" fill="#0f172a">i = 8</text>
  <text x="116" y="774" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#334155">Con n = 20, la condicion es i &lt; 10 y el incremento es de 2.</text>

  <text x="72" y="884" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#0f172a">3) Complejidad</text>
  <rect x="72" y="910" width="1294" height="118" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="2" />
  <text x="116" y="984" font-family="Courier New, monospace" font-size="36" font-weight="700" fill="#166534">T(n) = n / 4  =&gt;  O(n)</text>
</svg>
