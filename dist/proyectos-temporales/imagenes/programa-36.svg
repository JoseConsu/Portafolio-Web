<svg xmlns="http://www.w3.org/2000/svg" width="1439" height="1080" viewBox="0 0 1439 1080" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Programa temporal 36 - Eliminacion en posicion deseada</title>
  <desc id="desc">Lamina visual con eliminacion de un nodo en una posicion indicada dentro de una lista enlazada simple y salida de consola.</desc>

  <defs>
    <linearGradient id="fondo36" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8ff" />
      <stop offset="100%" stop-color="#eefcf5" />
    </linearGradient>
    <linearGradient id="cabecera36" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <marker id="flecha36" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
  </defs>

  <rect width="1439" height="1080" fill="url(#fondo36)" />
  <rect x="0" y="0" width="1439" height="118" fill="url(#cabecera36)" />

  <text x="62" y="74" font-family="Arial, Helvetica, sans-serif" font-size="37" font-weight="700" fill="#ffffff">
    Programa temporal 36: Eliminacion en posicion deseada en lista enlazada simple
  </text>

  <text x="68" y="172" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a" font-weight="700">Lista inicial</text>
  <rect x="68" y="194" width="1298" height="244" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />

  <text x="104" y="322" font-family="Courier New, monospace" font-size="30" fill="#0f172a">inicio</text>
  <line x1="184" y1="310" x2="260" y2="310" stroke="#0f766e" stroke-width="5" marker-end="url(#flecha36)" />

  <rect x="276" y="260" width="160" height="92" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2" />
  <text x="334" y="318" font-family="Courier New, monospace" font-size="31" fill="#0f172a">9</text>
  <line x1="436" y1="306" x2="510" y2="306" stroke="#0f766e" stroke-width="4" marker-end="url(#flecha36)" />

  <rect x="524" y="260" width="160" height="92" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2" />
  <text x="574" y="318" font-family="Courier New, monospace" font-size="31" fill="#0f172a">18</text>
  <line x1="684" y1="306" x2="758" y2="306" stroke="#0f766e" stroke-width="4" marker-end="url(#flecha36)" />

  <rect x="772" y="260" width="160" height="92" rx="12" fill="#ef4444" stroke="#991b1b" stroke-width="2" />
  <text x="830" y="318" font-family="Courier New, monospace" font-size="31" fill="#ffffff">27</text>
  <text x="796" y="380" font-family="Courier New, monospace" font-size="21" fill="#991b1b">posicion 3</text>
  <line x1="932" y1="306" x2="1006" y2="306" stroke="#0f766e" stroke-width="4" marker-end="url(#flecha36)" />

  <rect x="1020" y="260" width="160" height="92" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2" />
  <text x="1078" y="318" font-family="Courier New, monospace" font-size="31" fill="#0f172a">36</text>
  <line x1="1180" y1="306" x2="1254" y2="306" stroke="#0f766e" stroke-width="4" marker-end="url(#flecha36)" />

  <rect x="1268" y="260" width="88" height="92" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2" />
  <text x="1286" y="318" font-family="Courier New, monospace" font-size="31" fill="#0f172a">45</text>
  <text x="1280" y="380" font-family="Courier New, monospace" font-size="21" fill="#0f172a">null</text>

  <rect x="68" y="474" width="1298" height="182" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
  <text x="108" y="540" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#166534" font-weight="700">Operacion</text>
  <text x="108" y="588" font-family="Courier New, monospace" font-size="30" fill="#166534">actual.siguiente = actual.siguiente.siguiente</text>
  <text x="108" y="634" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#166534">Se salta el nodo de la posicion elegida y se reconecta la lista.</text>

  <text x="68" y="738" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a" font-weight="700">Salida final</text>
  <rect x="68" y="760" width="1298" height="252" rx="16" fill="#0b1220" />
  <text x="108" y="826" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">Lista inicial:</text>
  <text x="108" y="872" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">9-&gt;18-&gt;27-&gt;36-&gt;45-&gt;null</text>
  <text x="108" y="918" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">Eliminando en posicion 3</text>
  <text x="108" y="964" font-family="Courier New, monospace" font-size="29" fill="#34d399">9-&gt;18-&gt;36-&gt;45-&gt;null</text>
</svg>
