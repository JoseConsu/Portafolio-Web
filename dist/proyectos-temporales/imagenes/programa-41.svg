<svg xmlns="http://www.w3.org/2000/svg" width="1439" height="1080" viewBox="0 0 1439 1080" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Programa temporal 41 - For complejidad 2</title>
  <desc id="desc">Lamina visual que explica dos ciclos for anidados y complejidad cuadratica.</desc>

  <defs>
    <linearGradient id="fondo41" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="barra41" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9a3412" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
  </defs>

  <rect width="1439" height="1080" fill="url(#fondo41)" />
  <rect width="1439" height="120" fill="url(#barra41)" />
  <text x="64" y="76" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Programa temporal 41: For complejidad 2</text>

  <text x="72" y="178" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#0f172a">1) Codigo Java</text>
  <rect x="72" y="204" width="1294" height="380" rx="20" fill="#0b1220" />
  <text x="116" y="266" font-family="Courier New, monospace" font-size="29" fill="#93c5fd">int</text>
  <text x="178" y="266" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">c = 0, n = 20;</text>
  <text x="116" y="326" font-family="Courier New, monospace" font-size="29" fill="#c084fc">for</text>
  <text x="188" y="326" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">(int i = 0; i &lt; n; i++) {</text>
  <text x="170" y="386" font-family="Courier New, monospace" font-size="29" fill="#c084fc">for</text>
  <text x="242" y="386" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">(int k = 0; k &lt; n; k++) {</text>
  <text x="224" y="446" font-family="Courier New, monospace" font-size="29" fill="#facc15">c++;</text>
  <text x="170" y="506" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">}</text>
  <text x="116" y="546" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">}</text>

  <text x="72" y="660" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#0f172a">2) Multiplicacion de iteraciones</text>
  <rect x="72" y="686" width="610" height="234" rx="18" fill="#ffffff" stroke="#fb923c" stroke-width="2" />
  <text x="118" y="760" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#9a3412">Ciclo externo</text>
  <text x="118" y="824" font-family="Courier New, monospace" font-size="42" fill="#0f172a">n vueltas</text>
  <text x="118" y="880" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#334155">i toma valores de 0 hasta n - 1</text>

  <rect x="756" y="686" width="610" height="234" rx="18" fill="#ffffff" stroke="#818cf8" stroke-width="2" />
  <text x="802" y="760" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#4338ca">Ciclo interno</text>
  <text x="802" y="824" font-family="Courier New, monospace" font-size="42" fill="#0f172a">n vueltas por cada i</text>
  <text x="802" y="880" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#334155">k tambien recorre de 0 hasta n - 1</text>

  <rect x="72" y="958" width="1294" height="78" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2" />
  <text x="116" y="1009" font-family="Courier New, monospace" font-size="34" font-weight="700" fill="#9a3412">T(n) = n * n =&gt; O(n^2) | con n = 20, c = 400</text>
</svg>
