<svg xmlns="http://www.w3.org/2000/svg" width="1439" height="1080" viewBox="0 0 1439 1080" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Programa temporal 43 - Inventario con HashMap</title>
  <desc id="desc">Ficha visual sobre busqueda, actualizacion y complejidad promedio de un HashMap de inventario en Java.</desc>

  <defs>
    <linearGradient id="fondo43" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="header43" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <filter id="sombra43" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#052e16" flood-opacity="0.14" />
    </filter>
    <pattern id="puntos43" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#16a34a" opacity="0.08" />
    </pattern>
  </defs>

  <rect width="1439" height="1080" fill="url(#fondo43)" />
  <rect width="1439" height="1080" fill="url(#puntos43)" />
  <rect width="1439" height="120" fill="url(#header43)" />
  <text x="64" y="62" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Programa 43: Inventario con HashMap</text>
  <text x="66" y="98" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#dcfce7">Buscar y actualizar productos usando una llave unica, sin recorrer todo el inventario.</text>

  <rect x="72" y="164" width="600" height="230" rx="24" fill="#ffffff" stroke="#86efac" stroke-width="2" filter="url(#sombra43)" />
  <text x="112" y="222" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#0f172a">1. Idea central</text>
  <rect x="112" y="256" width="138" height="58" rx="17" fill="#fef3c7" stroke="#facc15" stroke-width="2" />
  <text x="132" y="292" font-family="Courier New, monospace" font-size="23" font-weight="700" fill="#92400e">PROD002</text>
  <text x="270" y="292" font-family="Courier New, monospace" font-size="27" font-weight="700" fill="#0f766e">-&gt;</text>
  <rect x="324" y="256" width="110" height="58" rx="17" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2" />
  <text x="344" y="292" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0f766e">hash()</text>
  <text x="454" y="292" font-family="Courier New, monospace" font-size="27" font-weight="700" fill="#0f766e">-&gt;</text>
  <rect x="508" y="256" width="106" height="58" rx="17" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
  <text x="529" y="292" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#14532d">bucket</text>
  <text x="112" y="354" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569">La llave se transforma en una posicion de la tabla.</text>

  <rect x="710" y="164" width="656" height="230" rx="24" fill="#ffffff" stroke="#86efac" stroke-width="2" filter="url(#sombra43)" />
  <text x="750" y="222" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#0f172a">2. Operaciones</text>
  <rect x="750" y="252" width="170" height="52" rx="16" fill="#ecfdf5" stroke="#16a34a" stroke-width="2" />
  <text x="788" y="285" font-family="Courier New, monospace" font-size="24" font-weight="700" fill="#166534">put()</text>
  <text x="944" y="285" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#334155">inserta o reemplaza</text>
  <rect x="750" y="320" width="170" height="52" rx="16" fill="#fef3c7" stroke="#facc15" stroke-width="2" />
  <text x="773" y="353" font-family="Courier New, monospace" font-size="24" font-weight="700" fill="#92400e">get()</text>
  <text x="944" y="353" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#334155">consulta por llave</text>

  <rect x="72" y="440" width="600" height="390" rx="24" fill="#111827" filter="url(#sombra43)" />
  <text x="112" y="498" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#ffffff">3. Codigo clave</text>
  <text x="112" y="558" font-family="Courier New, monospace" font-size="25" fill="#86efac">HashMap&lt;String, Producto&gt;</text>
  <text x="112" y="594" font-family="Courier New, monospace" font-size="25" fill="#e5e7eb">inventario = new HashMap&lt;&gt;();</text>
  <text x="112" y="656" font-family="Courier New, monospace" font-size="25" fill="#93c5fd">inventario.put</text>
  <text x="332" y="656" font-family="Courier New, monospace" font-size="25" fill="#e5e7eb">(</text>
  <text x="349" y="656" font-family="Courier New, monospace" font-size="25" fill="#fde68a">"PROD002"</text>
  <text x="484" y="656" font-family="Courier New, monospace" font-size="25" fill="#e5e7eb">, producto);</text>
  <text x="112" y="714" font-family="Courier New, monospace" font-size="25" fill="#93c5fd">inventario.get</text>
  <text x="332" y="714" font-family="Courier New, monospace" font-size="25" fill="#e5e7eb">(</text>
  <text x="349" y="714" font-family="Courier New, monospace" font-size="25" fill="#fde68a">"PROD002"</text>
  <text x="484" y="714" font-family="Courier New, monospace" font-size="25" fill="#e5e7eb">);</text>
  <text x="112" y="772" font-family="Courier New, monospace" font-size="25" fill="#93c5fd">inventario.put</text>
  <text x="332" y="772" font-family="Courier New, monospace" font-size="25" fill="#e5e7eb">(</text>
  <text x="349" y="772" font-family="Courier New, monospace" font-size="25" fill="#fde68a">"PROD002"</text>
  <text x="484" y="772" font-family="Courier New, monospace" font-size="25" fill="#e5e7eb">, nuevo);</text>

  <rect x="710" y="440" width="656" height="390" rx="24" fill="#ffffff" stroke="#bbf7d0" stroke-width="2" filter="url(#sombra43)" />
  <text x="750" y="498" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#0f172a">4. Tabla hash</text>
  <rect x="750" y="532" width="576" height="50" rx="14" fill="#052e16" />
  <text x="780" y="564" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#dcfce7">Llave</text>
  <text x="950" y="564" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#dcfce7">Producto</text>
  <text x="1190" y="564" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#dcfce7">Accion</text>

  <rect x="750" y="604" width="576" height="64" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  <text x="780" y="644" font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#0f766e">PROD001</text>
  <text x="950" y="644" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#334155">Ryzen 5 5600X</text>
  <text x="1190" y="644" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#64748b">guardar</text>

  <rect x="750" y="684" width="576" height="80" rx="16" fill="#ecfdf5" stroke="#16a34a" stroke-width="4" />
  <text x="780" y="733" font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#14532d">PROD002</text>
  <text x="950" y="717" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#14532d">Antes: Intel Core i7</text>
  <text x="950" y="745" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#166534">Despues: Mouse GT</text>
  <text x="1190" y="733" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#166534">reemplaza</text>

  <rect x="750" y="784" width="576" height="64" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
  <text x="780" y="824" font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#0f766e">PROD003</text>
  <text x="950" y="824" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#334155">Monitor Dell 24 FHD</text>
  <text x="1190" y="824" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#64748b">guardar</text>

  <rect x="72" y="900" width="1294" height="100" rx="22" fill="#052e16" filter="url(#sombra43)" />
  <rect x="112" y="926" width="328" height="48" rx="16" fill="#dcfce7" />
  <text x="136" y="957" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#14532d">get(PROD002): encuentra producto</text>
  <rect x="466" y="926" width="332" height="48" rx="16" fill="#fef3c7" />
  <text x="490" y="957" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#92400e">put(PROD002): reemplaza valor</text>
  <rect x="824" y="926" width="236" height="48" rx="16" fill="#ccfbf1" />
  <text x="848" y="957" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f766e">size() = 20</text>
  <rect x="1086" y="926" width="240" height="48" rx="16" fill="#bbf7d0" />
  <text x="1110" y="957" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#166534">O(1) promedio</text>
</svg>
