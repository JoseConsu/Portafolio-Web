<svg xmlns="http://www.w3.org/2000/svg" width="1439" height="1080" viewBox="0 0 1439 1080" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Programa temporal 38 - Lista circular simple CRUD</title>
  <desc id="desc">Lamina visual con inserciones, eliminaciones y cierre circular entre el ultimo nodo y el inicio.</desc>

  <defs>
    <linearGradient id="fondo38" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5fbff" />
      <stop offset="100%" stop-color="#eefaf3" />
    </linearGradient>
    <linearGradient id="cabecera38" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#14532d" />
    </linearGradient>
    <marker id="flecha38" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
  </defs>

  <rect width="1439" height="1080" fill="url(#fondo38)" />
  <rect x="0" y="0" width="1439" height="118" fill="url(#cabecera38)" />

  <text x="58" y="74" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#ffffff">
    Programa temporal 38: Lista circular simple CRUD en Java
  </text>

  <text x="72" y="174" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a" font-weight="700">1) Estructura circular</text>
  <rect x="72" y="198" width="1296" height="252" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
  <text x="112" y="286" font-family="Courier New, monospace" font-size="30" fill="#0f172a">inicio</text>
  <line x1="188" y1="274" x2="266" y2="274" stroke="#0f766e" stroke-width="5" marker-end="url(#flecha38)" />

  <rect x="284" y="224" width="148" height="94" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
  <text x="338" y="282" font-family="Courier New, monospace" font-size="32" fill="#166534">20</text>
  <line x1="432" y1="270" x2="506" y2="270" stroke="#0f766e" stroke-width="4" marker-end="url(#flecha38)" />

  <rect x="524" y="224" width="148" height="94" rx="14" fill="#e2e8f0" stroke="#334155" stroke-width="2" />
  <text x="578" y="282" font-family="Courier New, monospace" font-size="32" fill="#0f172a">40</text>
  <line x1="672" y1="270" x2="746" y2="270" stroke="#0f766e" stroke-width="4" marker-end="url(#flecha38)" />

  <rect x="764" y="224" width="148" height="94" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2" />
  <text x="818" y="282" font-family="Courier New, monospace" font-size="32" fill="#92400e">50</text>
  <line x1="912" y1="270" x2="986" y2="270" stroke="#0f766e" stroke-width="4" marker-end="url(#flecha38)" />

  <rect x="1004" y="224" width="148" height="94" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
  <text x="1058" y="282" font-family="Courier New, monospace" font-size="32" fill="#1d4ed8">60</text>
  <path d="M 1152 272 C 1242 272, 1266 362, 1180 394 C 944 482, 462 478, 302 334" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#flecha38)" />
  <text x="1118" y="432" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#0f766e">ultimo.siguiente vuelve a inicio</text>

  <text x="72" y="532" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a" font-weight="700">2) Operaciones soportadas</text>
  <rect x="72" y="556" width="1296" height="192" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
  <text x="112" y="622" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#0f172a">Insertar al inicio y al final</text>
  <text x="112" y="672" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#0f172a">Insertar en posicion deseada</text>
  <text x="728" y="622" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#0f172a">Eliminar al inicio y al final</text>
  <text x="728" y="672" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#0f172a">Eliminar en posicion deseada</text>
  <text x="112" y="722" font-family="Arial, Helvetica, sans-serif" font-size="23" fill="#475569">Cada accion debe mantener el ciclo y explicar cuando una posicion no existe.</text>

  <text x="72" y="828" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#0f172a" font-weight="700">3) Salida textual del simulador</text>
  <rect x="72" y="852" width="1296" height="164" rx="18" fill="#0b1220" />
  <text x="112" y="920" font-family="Courier New, monospace" font-size="29" fill="#e5e7eb">inicio -&gt; 20 -&gt; 40 -&gt; 50 -&gt; 60 -&gt; vuelve a 20</text>
  <text x="112" y="970" font-family="Courier New, monospace" font-size="29" fill="#34d399">Si la lista queda con un solo nodo, ese nodo se apunta a si mismo.</text>
</svg>
